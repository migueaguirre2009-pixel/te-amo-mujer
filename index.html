<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Isabella | El Manuscrito del Cosmos</title>
    
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Old+Standard+TT:ital,wght@0,400;1,400&family=Cinzel:wght@400;700&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #c5a059;
            --accent: #a2d2ff;
            --parchment: #f4e4bc;
            --ink: #2c1a0a;
            --space: #050508;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--space); color: var(--parchment); font-family: 'Old Standard TT', serif; overflow-x: hidden; }

        /* --- ESTRELLAS --- */
        #stars { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a0a15 0%, #050508 100%); }

        /* --- ACCESO --- */
        #access-screen {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 1.5s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .medieval-title { font-family: 'Cinzel'; font-size: 3rem; color: var(--gold); letter-spacing: 12px; margin-bottom: 20px; text-align: center; }
        .input-box { background: transparent; border: none; border-bottom: 2px solid var(--gold); color: white; font-size: 3rem; width: 100px; text-align: center; margin: 30px 0; outline: none; font-family: 'Cinzel'; }

        /* --- COHETE --- */
        #rocket-container { position: absolute; bottom: 15%; display: none; flex-direction: column; align-items: center; }
        .rocket-emoji { font-size: 50px; }
        .flame { font-size: 30px; animation: burn 0.1s infinite; opacity: 0; }
        @keyframes burn { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.3); opacity: 1; } }
        @keyframes launch-up { to { transform: translateY(-150vh) scale(0.5); } }

        /* --- UI PRINCIPAL --- */
        #main-ui { display: none; opacity: 0; transition: 2s; }
        nav { position: fixed; top: 0; width: 100%; padding: 20px; display: flex; justify-content: center; gap: 20px; background: rgba(0,0,0,0.8); z-index: 100; font-family: 'MedievalSharp'; }
        nav a { color: var(--gold); text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; }

        section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; text-align: center; }

        /* --- CONTADOR --- */
        .days-number { font-family: 'Cinzel'; font-size: 8rem; color: var(--accent); text-shadow: 0 0 40px rgba(162, 210, 255, 0.4); line-height: 1; }

        /* --- LA LUNA REALISTA --- */
        .moon-wrapper { position: relative; width: 250px; height: 250px; margin-bottom: 30px; }
        .moon {
            width: 100%; height: 100%;
            background: #d1d1d1;
            border-radius: 50%;
            position: relative;
            box-shadow: inset -25px -25px 60px rgba(0,0,0,0.5), 0 0 50px rgba(162,210,255,0.2);
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 30% 30%, #bbb 5%, transparent 10%),
                radial-gradient(circle at 70% 50%, #aaa 8%, transparent 12%),
                radial-gradient(circle at 40% 70%, #999 4%, transparent 8%),
                radial-gradient(circle at 80% 20%, #ccc 6%, transparent 10%);
        }
        .moon-glow { position: absolute; inset: -10px; border-radius: 50%; background: var(--accent); filter: blur(30px); opacity: 0.1; z-index: -1; }

        /* --- SOBRE Y CARTA --- */
        .envelope-container { perspective: 1000px; width: 300px; height: 200px; cursor: pointer; position: relative; margin-top: 50px; }
        .envelope {
            width: 100%; height: 100%; background: #8b5a2b; position: relative;
            transform-style: preserve-3d; transition: transform 0.8s;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .flap {
            position: absolute; top: 0; width: 100%; height: 100%;
            background: #a06b3e; clip-path: polygon(0 0, 50% 50%, 100% 0);
            transition: transform 0.6s 0.4s; transform-origin: top; z-index: 3;
        }
        /* Abrir sobre */
        .envelope-container.open .flap { transform: rotateX(180deg); z-index: 1; }
        .envelope-container.open .parchment-small { transform: translateY(-100px); opacity: 0; }

        .parchment-full {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center;
            opacity: 0; transition: 1s;
        }
        .parchment-full.active { display: flex; opacity: 1; }
        
        .parchment-scroll {
            background: var(--parchment); color: var(--ink);
            width: 90%; max-width: 650px; max-height: 85vh;
            padding: 60px 40px; overflow-y: auto; border-radius: 5px;
            box-shadow: 0 0 100px rgba(0,0,0,1); position: relative;
            border: 1px solid #d2b48c;
        }
        .letter-content { font-size: 1.2rem; line-height: 1.8; text-align: justify; white-space: pre-line; }
        .close-btn { position: absolute; top: 20px; right: 20px; color: var(--ink); font-size: 1.5rem; cursor: pointer; font-family: 'Cinzel'; }

        .btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 15px 35px; font-family: 'MedievalSharp'; cursor: pointer;
            transition: 0.4s; letter-spacing: 2px; margin-top: 20px;
        }
        .btn:hover { background: var(--gold); color: black; box-shadow: 0 0 20px var(--gold); }

        /* --- RAZONES --- */
        .jar-box { max-width: 600px; background: rgba(255,255,255,0.03); border: 1px solid var(--gold); padding: 40px; position: relative; }
        #reason-text { font-size: 1.5rem; color: var(--accent); min-height: 100px; font-style: italic; display: flex; align-items: center; justify-content: center; }

    </style>
</head>
<body>

    <canvas id="stars"></canvas>

    <div id="access-screen">
        <h1 class="medieval-title">PARA ISABELLA</h1>
        <input type="password" id="pin" class="input-box" maxlength="2" placeholder="··">
        <button class="btn" onclick="checkPin()">INICIAR VUELO</button>
        <div id="rocket-container">
            <span class="rocket-emoji">🚀</span>
            <span class="flame" id="flame-rocket">🔥</span>
        </div>
    </div>

    <div id="main-ui">
        <nav>
            <a href="#inicio">INICIO</a>
            <a href="#razones">RAZONES</a>
            <a href="#luna">LA PROMESA</a>
            <a href="#carta">MANUSCRITO</a>
        </nav>

        <section id="inicio">
            <h2 style="font-family: 'Cinzel'; letter-spacing: 5px; color: var(--gold);">NUESTRA HISTORIA</h2>
            <div class="days-number" id="days">0</div>
            <p style="letter-spacing: 5px; opacity: 0.6; font-family: 'MedievalSharp';">DÍAS DESDE EL 2 DE MARZO</p>
        </section>

        <section id="razones">
            <div class="jar-box">
                <div id="reason-text">Descubre por qué eres especial...</div>
                <div style="margin-top: 30px;">
                    <button class="btn" onclick="changeReason(-1)">ATRÁS</button>
                    <button class="btn" onclick="changeReason(1)">SIGUIENTE</button>
                </div>
                <p id="counter-label" style="margin-top: 20px; opacity: 0.4;">1 / 22</p>
            </div>
        </section>

        <section id="luna">
            <div class="moon-wrapper">
                <div class="moon-glow"></div>
                <div class="moon"></div>
            </div>
            <h2 style="font-family: 'Dancing Script'; font-size: 2.8rem; color: var(--accent);">Te amo a la luna en pasos de tortuga... 🐢</h2>
        </section>

        <section id="carta">
            <h2 style="font-family: 'Cinzel'; color: var(--gold); margin-bottom: 20px;">EL MANUSCRITO REAL</h2>
            <div class="envelope-container" onclick="openLetter()">
                <div class="envelope" id="env">
                    <div class="flap"></div>
                    <div style="position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: white; font-size: 0.7rem; letter-spacing: 2px;">PARA TI</div>
                </div>
            </div>
        </section>
    </div>

    <div class="parchment-full" id="modal">
        <div class="parchment-scroll">
            <span class="close-btn" onclick="closeLetter()">✕</span>
            <div class="letter-content" id="type-target"></div>
            <div class="signature" id="sig" style="display:none;">Miguel 💙</div>
        </div>
    </div>

    <script>
        const PIN_REAL = "22";
        const FECHA_INICIO = new Date('2026-03-02');
        const RAZONES = [
            "Por tu sonrisa que detiene el tiempo.",
            "Por cómo me haces sentir en paz.",
            "Por tu inteligencia que me inspira.",
            "Por aquel 2 de marzo donde todo empezó.",
            "Por ser mi refugio en el espacio.",
            "Por tu risa, mi sonido favorito.",
            "Por amarme 'a pasos de tortuga'.",
            "Por tu paciencia infinita.",
            "Por cada detalle que tienes conmigo.",
            "Por ser mi pensamiento favorito.",
            "Por tu mirada que lo dice todo.",
            "Por tu fuerza y valentía.",
            "Por hacerme mejor hombre.",
            "Por los sueños que compartimos.",
            "Por tu aroma que me hipnotiza.",
            "Por cómo cuidas nuestro amor.",
            "Por ser mi color azul.",
            "Por tu dulzura sin igual.",
            "Por ser mi compañera de vida.",
            "Por cada plan a futuro contigo.",
            "Por ser Isabella, única en el mundo.",
            "Porque simplemente te amo."
        ];

        let index = 0;

        function checkPin() {
            if(document.getElementById('pin').value === PIN_REAL) {
                const rocket = document.getElementById('rocket-container');
                const flame = document.getElementById('flame-rocket');
                document.querySelectorAll('.medieval-title, p, input, .btn').forEach(el => el.style.opacity = '0');
                
                rocket.style.display = 'flex';
                setTimeout(() => {
                    flame.style.opacity = '1';
                    rocket.style.animation = 'launch-up 2.5s forwards ease-in';
                    setTimeout(() => {
                        document.getElementById('access-screen').style.transform = 'translateY(-100%)';
                        document.getElementById('main-ui').style.display = 'block';
                        setTimeout(() => { document.getElementById('main-ui').style.opacity = '1'; updateDays(); }, 100);
                    }, 1500);
                }, 500);
            }
        }

        function updateDays() {
            const hoy = new Date();
            const d = Math.floor((hoy - FECHA_INICIO) / (1000*60*60*24));
            document.getElementById('days').innerText = d;
        }

        function changeReason(n) {
            index += n;
            if(index < 0) index = 0;
            if(index >= RAZONES.length) index = RAZONES.length - 1;
            const t = document.getElementById('reason-text');
            t.style.opacity = 0;
            setTimeout(() => {
                t.innerText = RAZONES[index];
                t.style.opacity = 1;
                document.getElementById('counter-label').innerText = `${index + 1} / 22`;
            }, 300);
        }

        const cartaLarga = `Isabella, mi vida, mi dama eterna...\n\nEscribo estas líneas bajo la luz de las mismas estrellas que nos vieron empezar este viaje. No es una carta común, es un testimonio de lo que mi alma guarda por ti desde aquel inolvidable 2 de marzo.\n\nDicen que el amor verdadero no tiene prisa, y nosotros lo sabemos mejor que nadie: te amo a pasos de tortuga, saboreando cada latido, cada risa y cada silencio que compartimos. En este universo tan vasto y a veces caótico, tú eres mi único puerto seguro, mi azul en medio de la oscuridad y mi razón para ser mejor cada día.\n\nPrometo cuidarte como el caballero que protege su tesoro más preciado, caminar a tu lado sin importar lo largo del camino y recordarte, en cada amanecer, que eres lo más hermoso que me ha pasado.\n\nGracias por permitirme habitar en tu corazón.\n\nSiempre tuyo, por encima de los astros y del tiempo,`;

        function openLetter() {
            const container = document.querySelector('.envelope-container');
            container.classList.add('open');
            setTimeout(() => {
                const modal = document.getElementById('modal');
                modal.style.display = 'flex';
                setTimeout(() => {
                    modal.classList.add('active');
                    typeWriter();
                }, 100);
            }, 1200);
        }

        function closeLetter() {
            document.getElementById('modal').classList.remove('active');
            setTimeout(() => document.getElementById('modal').style.display = 'none', 1000);
        }

        function typeWriter() {
            let i = 0;
            const target = document.getElementById('type-target');
            target.innerHTML = "";
            function type() {
                if (i < cartaLarga.length) {
                    target.innerHTML += cartaLarga.charAt(i);
                    i++;
                    setTimeout(type, 40);
                } else {
                    document.getElementById('sig').style.display = 'block';
                }
            }
            type();
        }

        // Estrellas
        const cvs = document.getElementById('stars');
        const ctx = cvs.getContext('2d');
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        for(let i=0; i<180; i++) {
            ctx.fillStyle = "white"; ctx.beginPath();
            ctx.arc(Math.random()*cvs.width, Math.random()*cvs.height, Math.random()*1.2, 0, Math.PI*2);
            ctx.fill();
        }
    </script>
</body>
</html>
